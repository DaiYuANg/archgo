baseURL: https://arcgo.example.org/
languageCode: zh-cn
title: ArcGo
languageDefault: zh

module:
  imports:
    - path: github.com/imfing/hextra

outputs:
  home: [html, llms]
  page: [html]
  section: [html, rss]

defaultContentLanguage: en
defaultContentLanguageInSubdir: false
languages:
  zh:
    languageName: 中文
    languageCode: zh-cn
    weight: 2
  en:
    languageName: English
    languageCode: en
    weight: 1

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  navbar:
    displayTitle: ArcGo
    displayIcon: true
  footer:
    displayCopyright: true
    displayPoweredBy: true

menu:
  main:
    - identifier: versions
      name: Versions
      nameEn: Versions
      weight: 1
      params:
        type: versions
    - identifier: roadmap
      name: Roadmap
      nameEn: Roadmap
      pageRef: /docs/roadmap
      weight: 2
    - identifier: authx
      name: AuthX
      nameEn: AuthX
      pageRef: /docs/authx
      weight: 3
    - identifier: clientx
      name: ClientX
      nameEn: ClientX
      pageRef: /docs/clientx
      weight: 4
    - identifier: collectionx
      name: CollectionX
      nameEn: CollectionX
      pageRef: /docs/collectionx
      weight: 5
    - identifier: configx
      name: ConfigX
      nameEn: ConfigX
      pageRef: /docs/configx
      weight: 6
    - identifier: dix
      name: Dix
      nameEn: Dix
      pageRef: /docs/dix
      weight: 7
    - identifier: eventx
      name: EventX
      nameEn: EventX
      pageRef: /docs/eventx
      weight: 8
    - identifier: httpx
      name: HTTPX
      nameEn: HTTPX
      pageRef: /docs/httpx
      weight: 9
    - identifier: logx
      name: LogX
      nameEn: LogX
      pageRef: /docs/logx
      weight: 10
    - identifier: observabilityx
      name: ObservabilityX
      nameEn: ObservabilityX
      pageRef: /docs/observabilityx
      weight: 11
    - identifier: github
      name: GitHub
      nameEn: GitHub
      url: https://github.com/DaiYuANg/arcgo
      weight: 12
    - identifier: theme-toggle
      name: Theme
      weight: 13
      params:
        type: theme-toggle
        label: false
    - identifier: language-switch
      name: Language Switcher
      weight: 14
      params:
        type: language-switch
        label: true
